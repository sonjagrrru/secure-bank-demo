services:
  # ===== Nginx Reverse Proxy (FIRST - must be accessible) =====
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: banking_nginx
    ports:
      # ONLY these two ports are public
      - "80:80"
      - "443:443"
    volumes:
      # Nginx configuration (certificates are generated in Dockerfile)
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    networks:
      - banking_network
    # Nginx does not depend on other services - they start after Nginx
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # security_opt:
    #  - no-new-privileges:true
    # cap_drop:
    #  - ALL

  # ===== PostgreSQL Database =====
  postgres:
    build:
      context: ..
      dockerfile: docker/Dockerfile.postgres
    container_name: banking_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-banking_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
      POSTGRES_DB: ${DB_NAME:-banking_db}
    # NO public ports - accessible only by Backend through private network
    volumes:
      # Encrypted volume for database
      - postgres_data:/var/lib/postgresql/data
    networks:
      - banking_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking_user -d banking_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Security constraints
    security_opt:
      - no-new-privileges:true

  # ===== Flask Backend API =====
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: banking_backend
    environment:
      # Database
      DATABASE_URL: postgresql://${DB_USER:-banking_user}:${DB_PASSWORD:-secure_password}@postgres:5432/${DB_NAME:-banking_db}
      
      # Security
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-vP3iyWHCPFfWBKNXAmjm2t5ffgQkKzVQZqznT2JPCjQ=}
      FLASK_ENV: ${FLASK_ENV:-production}
      
      # TLS/SSL
      SSL_CERT_PATH: /etc/ssl/certs/banking.crt
      SSL_KEY_PATH: /etc/ssl/private/banking.key
      
      # CORS - accessible ONLY through Nginx reverse proxy
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      
      # Port (internal to docker network, not public)
      PORT: 5000
    # NO public ports - accessible only through Nginx
    volumes:
      # Mount SSL certificates (if they exist)
      - ./certs/banking.crt:/etc/ssl/certs/banking.crt:ro
      - ./certs/banking.key:/etc/ssl/private/banking.key:ro
      - ./logs:/app/logs
    networks:
      - banking_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    
    # Security constraints
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ===== Frontend =====
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: banking_frontend
    # NO public ports - accessible only through Nginx
    environment:
      REACT_APP_API_URL: ${API_URL:-http://localhost/api}
    networks:
      - banking_network
    depends_on:
      - backend
    restart: unless-stopped
    
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  postgres_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  banking_network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.9.0/24
